name: Integracion Continua Java Maven

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  compilar-y-probar:
    runs-on: ubuntu-latest

    steps:
      - name: Obtener codigo fuente
        uses: actions/checkout@v4

      - name: Preparar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compilar proyecto Maven
        run: mvn -B clean package --file pom.xml

      - name: Ejecutar pruebas
        run: mvn test
